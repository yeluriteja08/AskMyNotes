<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AskMyNotes</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col">

  <header class="bg-black shadow-sm border-b">
    <div class="max-w-3xl mx-auto px-6 py-8">
      <h1 class="text-4xl font-bold">AskMyNotes</h1>
      <p class="mt-2 text-white-600">
        Upload a PDF. Ask a question. Get a grounded answer.
      </p>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-3xl mx-auto px-6 py-10 space-y-8">

      <section class="bg-white rounded-xl shadow p-6">
        <label for="pdf-input" class="block text-sm font-medium mb-3">
          Upload your notes (PDF)
        </label>

        <input
          type="file"
          id="pdf-input"
          accept="application/pdf"
          class="block w-full border rounded-lg p-3 bg-gray-50"
        >

        <p id="upload-status" class="mt-3 text-sm text-gray-600"></p>
      </section>

      <section class="bg-white rounded-xl shadow p-6">
        <label for="question" class="block text-sm font-medium mb-3">
          Your question
        </label>

        <textarea
          id="question"
          rows="3"
          placeholder="Type your question here..."
          class="w-full border rounded-lg p-3 resize-none"
        ></textarea>

        <button
          id="ask-btn"
          type="button"
          class="mt-4 px-5 py-3 bg-black text-white rounded-lg hover:bg-gray-800 transition"
        >
          Submit
        </button>

        <p id="status" class="mt-3 text-sm text-gray-600"></p>
      </section>

      <section>
        <div
          id="answer"
          hidden
          class="bg-white rounded-xl shadow p-6"
        >
          <h2 class="text-2xl font-semibold mb-4">
            Answer
          </h2>

          <div class="flex gap-3 mb-4">
            <p
              id="qtype-pill"
              hidden
              class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-sm"
            ></p>

            <p
              id="tool-pill"
              hidden
              class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm"
            ></p>
          </div>

          <p
            id="answer-text"
            class="leading-7 text-gray-800"
          ></p>

          <details
            id="sources"
            hidden
            class="mt-6 border-t pt-4"
          >
            <summary class="cursor-pointer font-medium">
              Sources
            </summary>

            <ul
              id="sources-list"
              class="mt-3 list-disc pl-5 space-y-2 text-sm text-gray-700"
            ></ul>
          </details>
        </div>
      </section>

    </div>
  </main>

  <footer class="border-t bg-white">
    <div class="max-w-3xl mx-auto px-6 py-6">
      <p class="text-sm text-gray-500">
        Built in the AI Engineering Bootcamp.
      </p>
    </div>
  </footer>

  <script src="app.js" defer></script>

</body>
</html>
